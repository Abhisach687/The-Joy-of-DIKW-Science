  <script>
    window.BOOK_DATA = {"lessons": [{"id": "p0-l1", "phase": "Phase 0 — Orientation", "title": "From Concept Consumer to Project Builder", "tags": ["orientation", "execution", "DIKW"], "xp": 20, "explainer": "This system is built to close the gap between understanding ideas and executing real work. Data science is not one skill; it is a chain of thinking moves: frame a problem, gather data, transform it, reason statistically, build code, visualize results, and decide what should happen next. DIKW is the hidden spine: raw data becomes information through cleaning and structure, information becomes knowledge through patterns and models, and knowledge becomes wisdom when you make responsible decisions.", "visual": {"type": "dikw-ladder", "title": "Execution ladder", "items": ["Data", "Information", "Knowledge", "Wisdom"]}, "code": "steps = ['define problem','get data','clean','analyze','model','visualize','decide']\nfor i, step in enumerate(steps, start=1):\n    print(f'{i}. {step}')", "exercise": {"prompt": "Create a Python list named pipeline with these three strings in order: 'data', 'information', 'knowledge'. Then print the list length.", "starter": "# Write your code here\n", "tests": [{"type": "contains", "value": "pipeline"}, {"type": "contains", "value": "print"}, {"type": "regex", "value": "pipeline\\s*=\\s*\\[.*[\"']data[\"'].*[\"']information[\"'].*[\"']knowledge[\"'].*\\]"}, {"type": "output_contains", "value": "3"}], "solution": "pipeline = ['data', 'information', 'knowledge']\nprint(len(pipeline))", "hints": ["Start by making a list with square brackets.", "Assign that list to a variable called pipeline.", "Use len(pipeline) inside print(...).", "Your list should contain three strings in the given order.", "pipeline = ['data', 'information', 'knowledge']\nprint(len(pipeline))"], "feedback": "This exercise checks whether you can represent an ordered pipeline as data. That small move matters because projects are built from explicit structures."}, "reflection": "Where do you usually stop in a project: understanding the idea, coding the first draft, or interpreting results?", "mistake": "Jumping to a model before defining the decision you want to support.", "projectNote": "Projects fail early when the goal is fuzzy. A clean problem statement saves time later.", "dikw": "Data is the raw project material; wisdom is choosing what action is justified."}, {"id": "p1-l1", "phase": "Phase 1 — DIKW and Thinking", "title": "Data, Information, Knowledge, Wisdom", "tags": ["DIKW", "thinking"], "xp": 20, "explainer": "Data are raw observations: numbers, labels, timestamps, text, images. Information is organized data with context: averages, groups, cleaned tables, trends. Knowledge is a reusable pattern: demand rises on weekends, missing values cluster by store, churn increases after a price hike. Wisdom is judgment: stock more inventory on Friday, do not automate this decision without human review, collect better data before acting.", "visual": {"type": "flow", "title": "DIKW flow", "nodes": ["Raw rows", "Summary & context", "Patterns & models", "Decision & judgment"]}, "code": "sales = [12, 15, 9, 14]\navg = sum(sales)/len(sales)\nprint('raw data:', sales)\nprint('information: average sales =', avg)\nprint('knowledge: weekend may be stronger if this pattern repeats')", "exercise": {"prompt": "Given temps = [20, 22, 24, 26], compute the average and print it.", "starter": "temps = [20, 22, 24, 26]\n", "tests": [{"type": "contains", "value": "sum("}, {"type": "contains", "value": "len("}, {"type": "contains", "value": "print"}], "solution": "temps = [20, 22, 24, 26]\navg = sum(temps)/len(temps)\nprint(avg)", "hints": ["Use sum(temps) to add values.", "Divide by len(temps).", "Store the result in avg before printing.", "Average means total divided by count.", "temps = [20, 22, 24, 26]\navg = sum(temps)/len(temps)\nprint(avg)"], "feedback": "A summary statistic is one of the simplest ways to turn raw data into information."}, "reflection": "Think of one decision in your life or work. What counts as data, and what would count as wisdom?", "mistake": "Treating a single summary as knowledge without checking whether the pattern is stable.", "projectNote": "Every dashboard should help someone move from numbers to decisions.", "dikw": "The DIKW lens keeps you from mistaking raw counts for actionable understanding."}, {"id": "p1-l2", "phase": "Phase 1 — DIKW and Thinking", "title": "Computational Thinking: Decomposition, Abstraction, Modeling", "tags": ["computational thinking", "abstraction"], "xp": 25, "explainer": "Computational thinking means structuring problems so a computer and a human can work on them together. Decomposition breaks a big task into smaller parts. Abstraction keeps only the details that matter. Modeling creates a simplified representation of reality. These moves make complex projects executable rather than overwhelming.", "visual": {"type": "pipeline", "title": "Problem decomposition", "steps": ["Big problem", "Subtasks", "Represent data", "Write algorithm", "Test and refine"]}, "code": "problem = 'analyze store sales'\nsubtasks = ['load csv', 'clean prices', 'group by day', 'plot trend']\nfor task in subtasks:\n    print('-', task)", "exercise": {"prompt": "Create a list called subtasks with at least three steps for solving 'predict exam score'. Then print the first step.", "starter": "# define subtasks below\n", "tests": [{"type": "contains", "value": "subtasks"}, {"type": "contains", "value": "print"}, {"type": "regex", "value": "subtasks\\s*=\\s*\\["}], "solution": "subtasks = ['collect study data', 'clean missing values', 'fit simple model']\nprint(subtasks[0])", "hints": ["Use a list named subtasks.", "Include strings describing steps.", "Access the first step with index 0.", "Then print it.", "subtasks = ['collect study data', 'clean missing values', 'fit simple model']\nprint(subtasks[0])"], "feedback": "Decomposition is often the first rescue move when a project feels too big."}, "reflection": "When you feel stuck, which is harder for you: breaking the problem apart or deciding what details to ignore?", "mistake": "Modeling the world with too much detail too early.", "projectNote": "Good project plans are decomposed, testable, and revisable.", "dikw": "Abstraction is how information becomes reusable knowledge."}, {"id": "p2-l1", "phase": "Phase 2 — Python Foundations", "title": "Variables, Expressions, and Conditionals", "tags": ["python", "basics"], "xp": 20, "explainer": "Variables name values so you can reason with them. Expressions compute new values. Conditionals let a program branch based on evidence. In data work, conditionals power filtering, rule-based cleaning, and decision logic.", "visual": {"type": "decision", "title": "Conditional logic", "question": "score >= 60?", "yes": "pass", "no": "review"}, "code": "score = 72\nif score >= 60:\n    print('pass')\nelse:\n    print('review')", "exercise": {"prompt": "Set score to 55 and write an if/else block that prints 'pass' when score is at least 60, otherwise 'review'.", "starter": "score = 55\n", "tests": [{"type": "contains", "value": "if"}, {"type": "contains", "value": "else"}, {"type": "contains", "value": "print"}], "solution": "score = 55\nif score >= 60:\n    print('pass')\nelse:\n    print('review')", "hints": ["Use if score >= 60:", "Add an else branch.", "Each branch should print a string.", "Indent the print statements.", "score = 55\nif score >= 60:\n    print('pass')\nelse:\n    print('review')"], "feedback": "Conditionals are tiny decision systems. In projects, they become filtering rules and business logic."}, "reflection": "What real project rule could be expressed as an if/else statement?", "mistake": "Using = instead of == in a condition.", "projectNote": "Many data cleaning rules are just chained conditionals.", "dikw": "A conditional uses information to trigger action."}, {"id": "p2-l2", "phase": "Phase 2 — Python Foundations", "title": "Loops, Strings, Lists, and Dictionaries", "tags": ["python", "data structures"], "xp": 25, "explainer": "Lists store ordered collections. Dictionaries map keys to values. Strings represent text. Loops let you repeat work across many items. These are the workhorses of beginner data projects because real data almost always arrives as collections rather than single values.", "visual": {"type": "table", "title": "Data structures at a glance", "headers": ["Structure", "Best for"], "rows": [["list", "ordered items"], ["dict", "named lookup"], ["string", "text"], ["loop", "repeat across collection"]]}, "code": "user = {'name': 'Asha', 'visits': [3, 5, 2]}\ntotal = 0\nfor v in user['visits']:\n    total += v\nprint(user['name'], total)", "exercise": {"prompt": "Create a dictionary called book with keys 'title' and 'pages'. Print the value of 'title'.", "starter": "# your dictionary here\n", "tests": [{"type": "contains", "value": "book"}, {"type": "contains", "value": "title"}, {"type": "contains", "value": "print"}], "solution": "book = {'title': 'DIKW Science', 'pages': 300}\nprint(book['title'])", "hints": ["Dictionaries use curly braces.", "Write key-value pairs separated by commas.", "Access a value with square brackets.", "Print book['title'].", "book = {'title': 'DIKW Science', 'pages': 300}\nprint(book['title'])"], "feedback": "Dictionaries help model real entities. That is why they show up everywhere in APIs and JSON."}, "reflection": "Which structure feels more natural to you: ordered lists or named dictionaries?", "mistake": "Forgetting quotes around string keys in dictionaries.", "projectNote": "A lot of web and data formats are nested dictionaries plus lists.", "dikw": "Structure is what lets raw data become information."}, {"id": "p2-l3", "phase": "Phase 2 — Python Foundations", "title": "Files, Modules, and Debugging Basics", "tags": ["python", "debugging", "files"], "xp": 25, "explainer": "Projects almost always outgrow the notebook cell or tiny script. Files let your program persist data. Modules organize reusable code. Debugging is the discipline of narrowing down what is wrong, where it goes wrong, and what evidence can confirm the fix.", "visual": {"type": "pipeline", "title": "Debug loop", "steps": ["Observe error", "Make small hypothesis", "Test one thing", "Inspect output", "Fix and retest"]}, "code": "nums = [1, 2, 3]\nfor i in range(len(nums)):\n    print(i, nums[i])\n# Debugging question: what happens if you use len(nums)+1?", "exercise": {"prompt": "Fix the bug so the code prints all items without IndexError.\nnums = [10, 20, 30]\nfor i in range(len(nums)+1):\n    print(nums[i])", "starter": "nums = [10, 20, 30]\nfor i in range(len(nums)+1):\n    print(nums[i])\n", "tests": [{"type": "not_contains", "value": "len(nums)+1"}, {"type": "contains", "value": "range(len(nums))"}], "solution": "nums = [10, 20, 30]\nfor i in range(len(nums)):\n    print(nums[i])", "hints": ["The loop goes one step too far.", "Valid indices stop before len(nums).", "Use range(len(nums)).", "Or loop directly over nums.", "nums = [10, 20, 30]\nfor i in range(len(nums)):\n    print(nums[i])"], "feedback": "Debugging gets easier when you reason about boundaries and invariants."}, "reflection": "Do you usually debug by guessing, printing, or testing one assumption at a time?", "mistake": "Changing many things at once so you do not know which change fixed the bug.", "projectNote": "Reliable projects come from disciplined debugging, not heroics.", "dikw": "Debugging turns scattered symptoms into useful information."}, {"id": "p3-l1", "phase": "Phase 3 — Functions and Functional Thinking", "title": "Functions, Parameters, and Return Values", "tags": ["python", "functions"], "xp": 20, "explainer": "Functions package logic into reusable units. Parameters make them flexible. Return values let you build bigger pipelines by feeding one function’s output into another. This is how scripts become systems.", "visual": {"type": "function-box", "title": "Function as a transformer", "input": "raw values", "process": "clean + summarize", "output": "average"}, "code": "def mean(values):\n    return sum(values) / len(values)\n\nprint(mean([2, 4, 6]))", "exercise": {"prompt": "Write a function square(x) that returns x * x. Then print square(5).", "starter": "# write your function here\n", "tests": [{"type": "contains", "value": "def square"}, {"type": "contains", "value": "return"}, {"type": "contains", "value": "square(5)"}], "solution": "def square(x):\n    return x * x\n\nprint(square(5))", "hints": ["Use def square(x):", "Inside, return x * x.", "Call the function with 5.", "Print the result.", "def square(x):\n    return x * x\n\nprint(square(5))"], "feedback": "Functions are the first real step from one-off code toward reusable project components."}, "reflection": "What repeated logic in your recent work could have been turned into a function?", "mistake": "Printing inside a function when you actually need to return a value.", "projectNote": "Functions make testing easier because you can test small pieces independently.", "dikw": "Functions encode knowledge patterns as reusable transformations."}, {"id": "p3-l2", "phase": "Phase 3 — Functions and Functional Thinking", "title": "Scope, Pure Functions, and Comprehensions", "tags": ["functions", "functional thinking"], "xp": 25, "explainer": "A pure function depends only on its inputs and returns a value without hidden side effects. That makes it easier to trust and test. Comprehensions are compact ways to transform collections. Together they encourage pipeline thinking: input, transform, output.", "visual": {"type": "table", "title": "Pure vs impure", "headers": ["Type", "Trait"], "rows": [["pure", "same input -> same output"], ["impure", "depends on or changes outside state"]]}, "code": "nums = [1, 2, 3, 4]\nsquares = [n*n for n in nums if n % 2 == 0]\nprint(squares)", "exercise": {"prompt": "Using a list comprehension, create evens from nums = [1,2,3,4,5,6] containing only even numbers.", "starter": "nums = [1,2,3,4,5,6]\n", "tests": [{"type": "contains", "value": "["}, {"type": "contains", "value": "for"}, {"type": "contains", "value": "if"}], "solution": "nums = [1,2,3,4,5,6]\nevens = [n for n in nums if n % 2 == 0]\nprint(evens)", "hints": ["Use a list comprehension.", "Loop through nums.", "Keep items where n % 2 == 0.", "Store the result in evens.", "nums = [1,2,3,4,5,6]\nevens = [n for n in nums if n % 2 == 0]\nprint(evens)"], "feedback": "Comprehensions are concise, but clarity still matters. Use them when they make transformations easier to read."}, "reflection": "Would your code become clearer or more confusing if you replaced loops with comprehensions?", "mistake": "Packing too much logic into one comprehension.", "projectNote": "Pure transformation steps are easier to compose into a data pipeline.", "dikw": "Pipelines formalize how information is transformed."}, {"id": "p4-l1", "phase": "Phase 4 — OOP and Abstraction", "title": "Classes, Instances, and Methods", "tags": ["OOP", "abstraction"], "xp": 25, "explainer": "Object-oriented programming groups data and behavior. A class defines a model. An instance is a concrete example. Methods describe what the object can do. In data projects, classes are useful when you have meaningful entities with state, such as experiments, datasets, or simulations.", "visual": {"type": "oop", "title": "Class model", "className": "Dataset", "attrs": ["name", "rows"], "methods": ["summary()", "add_row()"]}, "code": "class Counter:\n    def __init__(self, start=0):\n        self.value = start\n    def inc(self):\n        self.value += 1\n\nc = Counter()\nc.inc()\nprint(c.value)", "exercise": {"prompt": "Complete a class Dog with __init__(self, name) that stores name on self.name. Then create Dog('Milo') and print the name.", "starter": "class Dog:\n    pass\n\n# create object below\n", "tests": [{"type": "contains", "value": "class Dog"}, {"type": "contains", "value": "__init__"}, {"type": "contains", "value": "self.name"}], "solution": "class Dog:\n    def __init__(self, name):\n        self.name = name\n\nd = Dog('Milo')\nprint(d.name)", "hints": ["Add an __init__ method.", "It should accept self and name.", "Store name in self.name.", "Instantiate with Dog('Milo').", "class Dog:\n    def __init__(self, name):\n        self.name = name\n\nd = Dog('Milo')\nprint(d.name)"], "feedback": "Classes help when you need a clear abstraction barrier around related data and behavior."}, "reflection": "Which project object would be more natural as a class than as a dictionary?", "mistake": "Forgetting self when defining or calling methods.", "projectNote": "Use OOP when it simplifies the design, not just because you can.", "dikw": "A class is a reusable knowledge structure about a kind of thing."}, {"id": "p4-l2", "phase": "Phase 4 — OOP and Abstraction", "title": "Encapsulation, Inheritance, and Cleaner Design", "tags": ["OOP", "design"], "xp": 25, "explainer": "Encapsulation hides internal details behind a clear interface. Inheritance lets one class extend another, though it should be used with care. Good abstraction reduces mental load. The point is not to sound advanced; the point is to make systems easier to understand and change.", "visual": {"type": "tree", "title": "Inheritance tree", "root": "Model", "children": ["RegressionModel", "Classifier"]}, "code": "class Model:\n    def kind(self):\n        return 'generic'\n\nclass Classifier(Model):\n    def kind(self):\n        return 'classifier'\n\nm = Classifier()\nprint(m.kind())", "exercise": {"prompt": "Create a class Animal with method speak returning 'sound'. Create a subclass Cat that overrides speak to return 'meow'. Print Cat().speak().", "starter": "# write classes here\n", "tests": [{"type": "contains", "value": "class Animal"}, {"type": "contains", "value": "class Cat"}, {"type": "contains", "value": "speak"}], "solution": "class Animal:\n    def speak(self):\n        return 'sound'\n\nclass Cat(Animal):\n    def speak(self):\n        return 'meow'\n\nprint(Cat().speak())", "hints": ["Write the parent class first.", "Then make Cat inherit from Animal.", "Override the speak method.", "Print the method result.", "class Animal:\n    def speak(self):\n        return 'sound'\n\nclass Cat(Animal):\n    def speak(self):\n        return 'meow'\n\nprint(Cat().speak())"], "feedback": "Inheritance is useful when there is a genuine is-a relationship and a shared interface."}, "reflection": "Have you ever overcomplicated a design by creating too many abstractions?", "mistake": "Using inheritance where simple composition would be clearer.", "projectNote": "Cleaner design speeds up later iteration and debugging.", "dikw": "Abstraction is wisdom about what complexity to hide."}, {"id": "p5-l1", "phase": "Phase 5 — Data Handling and Pandas", "title": "Series, DataFrames, and Loading Data", "tags": ["pandas", "data handling"], "xp": 30, "explainer": "Tabular thinking is central to data science. A Series is like one labeled column. A DataFrame is a table of columns. Loading data is never just technical plumbing; it is your first encounter with the project’s real evidence and real mess.", "visual": {"type": "dataframe", "title": "Tiny DataFrame", "columns": ["day", "sales", "store"], "rows": [["Mon", "100", "A"], ["Tue", "120", "A"], ["Mon", "90", "B"]]}, "code": "import pandas as pd\n\ndf = pd.DataFrame({'day':['Mon','Tue','Mon'], 'sales':[100,120,90], 'store':['A','A','B']})\nprint(df)\nprint(df['sales'].mean())", "exercise": {"prompt": "Using pandas, create a DataFrame df with one column 'x' and values [1,2,3]. Then print df['x'].sum().", "starter": "import pandas as pd\n", "tests": [{"type": "contains", "value": "pd.DataFrame"}, {"type": "contains", "value": "sum()"}, {"type": "contains", "value": "print"}], "solution": "import pandas as pd\ndf = pd.DataFrame({'x':[1,2,3]})\nprint(df['x'].sum())", "hints": ["Use pd.DataFrame with a dictionary.", "The key should be 'x'.", "The values should be [1,2,3].", "Then print the column sum.", "import pandas as pd\ndf = pd.DataFrame({'x':[1,2,3]})\nprint(df['x'].sum())"], "feedback": "A table is often the bridge from messy reality to structured analysis."}, "reflection": "When you open a dataset, what do you inspect first: columns, missing values, weird categories, or row count?", "mistake": "Assuming loaded data already has the right types and meanings.", "projectNote": "The first five minutes with a dataset can save hours of confusion.", "dikw": "Tabulation and structure turn rows into information."}, {"id": "p5-l2", "phase": "Phase 5 — Data Handling and Pandas", "title": "Cleaning, Missing Values, Filtering, Grouping, Joining", "tags": ["pandas", "cleaning", "EDA"], "xp": 35, "explainer": "Real data is incomplete, inconsistent, duplicated, and noisy. Cleaning is not glamorous, but it is where analysis earns trust. Filtering selects relevant slices. Grouping summarizes by category. Joining combines evidence across tables. These are not just techniques; they are how raw records become usable information.", "visual": {"type": "pipeline", "title": "Cleaning pipeline", "steps": ["inspect columns", "find missing", "fix types", "filter rows", "group and summarize", "join context"]}, "code": "import pandas as pd\n\ndf = pd.DataFrame({'team':['A','A','B'], 'score':[10,None,8]})\nclean = df.fillna(df['score'].mean())\nprint(clean.groupby('team')['score'].mean())", "exercise": {"prompt": "Given df with column score containing [10, None, 20], fill missing values with 0 and print the result.", "starter": "import pandas as pd\ndf = pd.DataFrame({'score':[10, None, 20]})\n", "tests": [{"type": "contains", "value": "fillna"}, {"type": "contains", "value": "print"}], "solution": "import pandas as pd\ndf = pd.DataFrame({'score':[10, None, 20]})\nprint(df.fillna(0))", "hints": ["Use fillna on the DataFrame or column.", "Pass 0 as the replacement value.", "Print the filled result.", "Notice that None becomes missing in pandas.", "import pandas as pd\ndf = pd.DataFrame({'score':[10, None, 20]})\nprint(df.fillna(0))"], "feedback": "Data quality choices affect everything downstream: summary statistics, models, and decisions."}, "reflection": "When is it reasonable to fill missing values, and when should you stop and ask why they are missing?", "mistake": "Treating missingness as a minor nuisance when it may encode an important process.", "projectNote": "Clean data is not data with no issues; it is data whose issues are understood and handled deliberately.", "dikw": "Cleaning is the work of turning corrupted signals into interpretable information."}, {"id": "p6-l1", "phase": "Phase 6 — Statistics Foundations", "title": "Descriptive Statistics: Center, Spread, Shape", "tags": ["statistics", "descriptive"], "xp": 30, "explainer": "Descriptive statistics summarize what a dataset looks like. Measures of center such as mean and median tell you what is typical. Spread measures such as range and standard deviation tell you how variable the data is. Shape tells you whether the distribution is symmetric, skewed, or heavy-tailed. A single average is often not enough.", "visual": {"type": "distribution", "title": "Distribution anatomy", "labels": ["center", "spread", "shape"]}, "code": "import statistics as st\nvalues = [2, 3, 3, 4, 10]\nprint('mean', st.mean(values))\nprint('median', st.median(values))", "exercise": {"prompt": "Compute and print the median of values = [1, 2, 100].", "starter": "import statistics as st\nvalues = [1, 2, 100]\n", "tests": [{"type": "contains", "value": "median"}, {"type": "contains", "value": "print"}], "solution": "import statistics as st\nvalues = [1, 2, 100]\nprint(st.median(values))", "hints": ["Use the statistics module alias st.", "Call st.median(values).", "Print the result.", "The median is the middle value after sorting.", "import statistics as st\nvalues = [1, 2, 100]\nprint(st.median(values))"], "feedback": "The median is robust to outliers, which is why it often gives better information than the mean."}, "reflection": "When would the median tell a more honest story than the mean?", "mistake": "Reporting only the mean on skewed data.", "projectNote": "Descriptive statistics are the first sanity check before modeling.", "dikw": "Summaries compress data into information, but only responsibly when context is preserved."}, {"id": "p6-l2", "phase": "Phase 6 — Statistics Foundations", "title": "Probability, Sampling, Estimation, and Confidence", "tags": ["probability", "sampling", "inference"], "xp": 35, "explainer": "Probability is a language for uncertainty. Sampling is how we learn about a larger population using a subset. Estimation asks what parameter values are plausible. Confidence intervals express a range of uncertainty under a model and sampling process. Statistical thinking is not certainty thinking; it is disciplined uncertainty thinking.", "visual": {"type": "sampling", "title": "Population to sample", "population": "Population", "sample": "Sample", "estimate": "Estimate ± uncertainty"}, "code": "import random\nsample = [random.randint(1, 6) for _ in range(20)]\nprint('sample mean', sum(sample)/len(sample))", "exercise": {"prompt": "Simulate 10 fair coin flips using random.choice(['H','T']) and print the list.", "starter": "import random\n", "tests": [{"type": "contains", "value": "random.choice"}, {"type": "contains", "value": "for"}, {"type": "contains", "value": "print"}], "solution": "import random\nflips = [random.choice(['H','T']) for _ in range(10)]\nprint(flips)", "hints": ["Use a list comprehension.", "Call random.choice(['H','T']).", "Repeat 10 times with range(10).", "Store the list in flips and print it.", "import random\nflips = [random.choice(['H','T']) for _ in range(10)]\nprint(flips)"], "feedback": "Simulation is a practical way to build intuition about probability and sampling variability."}, "reflection": "How much uncertainty are you comfortable communicating when making a decision?", "mistake": "Treating a confidence interval as a guarantee about one realized interval rather than a procedure-based concept.", "projectNote": "Good analysts communicate uncertainty instead of hiding it.", "dikw": "Sampling turns limited data into provisional knowledge, not final truth."}, {"id": "p6-l3", "phase": "Phase 6 — Statistics Foundations", "title": "Hypothesis Tests, Correlation, Regression Intuition, and Fallacies", "tags": ["hypothesis testing", "correlation", "regression", "bias"], "xp": 35, "explainer": "Hypothesis testing is a structured way to ask whether observed evidence is surprising under a baseline assumption. Correlation measures association, not causation. Regression models relationships, but every model depends on assumptions, measurement choices, and context. Statistical fallacies often arise from bias, inappropriate comparisons, or overclaiming from weak evidence.", "visual": {"type": "scatter-causation", "title": "Correlation is not causation", "x": "ice cream sales", "y": "drownings", "lurking": "temperature"}, "code": "xs = [1,2,3,4]\nys = [2,4,6,8]\n# simple slope intuition\nslope = (ys[-1]-ys[0])/(xs[-1]-xs[0])\nprint('slope', slope)", "exercise": {"prompt": "Write one Python comment explaining why correlation does not prove causation.", "starter": "# write your comment here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Correlation shows association, but a third variable or reverse causation may explain it.", "hints": ["You only need a comment line.", "Mention association vs cause.", "A third variable is a common explanation.", "Keep it short and clear.", "# Correlation shows association, but a third variable or reverse causation may explain it."], "feedback": "Interpretation matters as much as calculation. The number alone is not the conclusion."}, "reflection": "What is one chart or statistic you have seen used in a misleading way?", "mistake": "Leaping from a strong correlation to a policy recommendation without examining the mechanism.", "projectNote": "Decision-makers need honest interpretation, not just significant p-values.", "dikw": "Wisdom begins when you know what the model cannot justify."}, {"id": "p7-l1", "phase": "Phase 7 — Visualization", "title": "Choosing the Right Chart and Visual Honesty", "tags": ["visualization", "matplotlib", "seaborn", "plotly"], "xp": 30, "explainer": "A chart is a reasoning tool, not decoration. Line charts show change over ordered time. Bars compare categories. Histograms show distributions. Scatter plots show relationships. Box plots show spread and outliers. Heatmaps show structured intensity. Visual honesty means choosing scales, encodings, and annotations that help the viewer think accurately.", "visual": {"type": "chart-picker", "title": "Chart chooser", "cards": [["line", "trend over time"], ["bar", "compare categories"], ["histogram", "distribution"], ["scatter", "relationship"], ["box", "spread/outliers"], ["heatmap", "matrix pattern"]]}, "code": "import matplotlib.pyplot as plt\nx = [1,2,3,4]\ny = [2,3,5,4]\nplt.plot(x,y)\nplt.title('Trend')\nplt.show()", "exercise": {"prompt": "A dataset has monthly revenue for 24 months. Which chart is most appropriate? Type your answer as a Python comment with one word.", "starter": "# your answer here\n", "tests": [{"type": "contains", "value": "#"}, {"type": "contains_any", "values": ["line", "Line"]}], "solution": "# line", "hints": ["This is data over time.", "The order matters.", "You want to show trend.", "A line chart is usually best.", "# line"], "feedback": "Chart choice is an interpretation choice. It shapes what patterns become visible."}, "reflection": "Have you ever chosen a chart because it looked nice rather than because it fit the question?", "mistake": "Using bars for continuous time trends when a line would show continuity better.", "projectNote": "The right chart can save a long explanation.", "dikw": "Visualization is one of the fastest ways to convert information into insight."}, {"id": "p7-l2", "phase": "Phase 7 — Visualization", "title": "Matplotlib, Seaborn Patterns, and Plotly Interactivity", "tags": ["matplotlib", "seaborn", "plotly"], "xp": 30, "explainer": "Matplotlib gives fine-grained control. Seaborn makes common statistical visualizations easier and more expressive. Plotly adds interactivity such as hover, zoom, and filtering. Learn the underlying visual grammar first; then pick the tool that best matches your need.", "visual": {"type": "table", "title": "Visualization ecosystem", "headers": ["Tool", "Strength"], "rows": [["matplotlib", "control"], ["seaborn", "statistical patterns"], ["plotly", "interactivity"]]}, "code": "import seaborn as sns\nimport pandas as pd\n\ndf = pd.DataFrame({'x':[1,2,3,4], 'y':[2,1,3,5]})\nax = sns.scatterplot(data=df, x='x', y='y')\nfig = ax.get_figure()\nfig.show()", "exercise": {"prompt": "Write a Python comment naming one reason to use Plotly instead of a static chart.", "starter": "# answer here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Plotly supports interactive hover and zoom, which helps explore details.", "hints": ["Mention interactivity.", "Hover or zoom are good examples.", "Use a comment line.", "Keep it practical.", "# Plotly supports interactive hover and zoom, which helps explore details."], "feedback": "Tool choice follows communication needs. Interactivity is helpful when exploration matters."}, "reflection": "When does interactivity help, and when does it distract from the message?", "mistake": "Adding interactivity to a chart that should simply tell one clear story.", "projectNote": "Exploration and explanation often need different chart styles.", "dikw": "Interactivity can help move from broad information to specific knowledge."}, {"id": "p8-l1", "phase": "Phase 8 — Data Science Workflow", "title": "Problem Definition, Data Collection, and Feature Thinking", "tags": ["workflow", "features", "problem framing"], "xp": 35, "explainer": "The workflow starts before the model. Define the decision, audience, success metric, and constraints. Then ask what data is needed, what data is available, what is missing, and what features might represent the underlying process. A weak problem definition can make a strong model useless.", "visual": {"type": "pipeline", "title": "Workflow start", "steps": ["define decision", "define metric", "identify data", "collect/simulate", "design features"]}, "code": "project = {\n    'problem': 'predict churn',\n    'metric': 'recall at top 20%',\n    'features': ['tenure', 'usage_days', 'support_tickets']\n}\nprint(project)", "exercise": {"prompt": "Create a dictionary named project with keys 'problem' and 'metric'. Use any sensible strings and print the dictionary.", "starter": "# your project dict here\n", "tests": [{"type": "contains", "value": "project"}, {"type": "contains", "value": "problem"}, {"type": "contains", "value": "metric"}], "solution": "project = {'problem': 'predict late delivery', 'metric': 'mae'}\nprint(project)", "hints": ["Use a dictionary with two keys.", "The keys should be strings.", "Print the dictionary after defining it.", "Choose a metric that matches your problem.", "project = {'problem': 'predict late delivery', 'metric': 'mae'}\nprint(project)"], "feedback": "Defining the problem and metric early keeps your project aligned with real goals."}, "reflection": "What metric would best reflect success in a project you care about?", "mistake": "Starting with a dataset and hoping the problem will emerge by itself.", "projectNote": "Feature thinking is where domain understanding enters the pipeline.", "dikw": "Wisdom starts with asking the right question before collecting more data."}, {"id": "p8-l2", "phase": "Phase 8 — Data Science Workflow", "title": "EDA, Communication, and Ethics Across the Cycle", "tags": ["EDA", "communication", "ethics"], "xp": 35, "explainer": "Exploratory data analysis is where you learn the shape, quality, and surprise structure of the data. Communication is where analysis becomes useful. Ethics runs through the whole cycle: what was collected, whose data is missing, who could be harmed, and how uncertainty is communicated.", "visual": {"type": "cycle", "title": "Data science cycle", "items": ["define", "collect", "clean", "explore", "model", "communicate", "reflect ethics"]}, "code": "summary = {\n    'finding': 'higher support tickets associate with churn',\n    'limitation': 'observational data only',\n    'decision': 'test proactive support for at-risk users'\n}\nprint(summary)", "exercise": {"prompt": "Write a Python comment naming one ethical risk in a churn model.", "starter": "# your comment here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# A churn model may treat some customer groups unfairly if the training data reflects past bias.", "hints": ["Think about bias, privacy, or unfair treatment.", "Use a single comment line.", "Mention a real risk, not a vague word.", "Connect the risk to data or decisions.", "# A churn model may treat some customer groups unfairly if the training data reflects past bias."], "feedback": "Ethics is not a final chapter add-on. It changes what data you collect, what models you trust, and what actions you recommend."}, "reflection": "What uncertainty or limitation do you most often avoid mentioning when presenting work?", "mistake": "Treating communication as a slide-deck phase instead of an analytical phase.", "projectNote": "The best analysis can still fail if the decision-maker does not understand the tradeoff.", "dikw": "Communication is how knowledge becomes shared practical wisdom."}, {"id": "p9-l1", "phase": "Phase 9 — Machine Learning Foundations", "title": "Supervised vs Unsupervised Learning, Splits, and Leakage", "tags": ["ML", "supervised", "unsupervised", "leakage"], "xp": 35, "explainer": "Supervised learning predicts a target using labeled examples. Unsupervised learning seeks structure without explicit labels. Train, validation, and test splits help estimate generalization. Leakage happens when information from the future or the answer sneaks into training. Leakage makes a model look smart without actually being useful.", "visual": {"type": "ml-split", "title": "Split thinking", "boxes": ["train", "validation", "test"]}, "code": "from sklearn.model_selection import train_test_split\nX = [[1],[2],[3],[4],[5]]\ny = [0,0,0,1,1]\nX_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.4, random_state=0)\nprint(len(X_train), len(X_test))", "exercise": {"prompt": "Write a Python comment defining leakage in one sentence.", "starter": "# your definition here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Leakage happens when training uses information that would not be available at prediction time.", "hints": ["Mention training and prediction time.", "It often involves future data or target leakage.", "Use one clear sentence.", "Keep it general.", "# Leakage happens when training uses information that would not be available at prediction time."], "feedback": "Leakage is one of the fastest ways to build a misleading model."}, "reflection": "What pieces of information in your domain might accidentally leak the answer?", "mistake": "Normalizing or imputing using the full dataset before splitting.", "projectNote": "A realistic evaluation pipeline matters as much as the algorithm.", "dikw": "Knowledge from data must be earned under realistic constraints."}, {"id": "p9-l2", "phase": "Phase 9 — Machine Learning Foundations", "title": "Metrics, Confusion Matrix, ROC/AUC, Overfitting and Underfitting", "tags": ["metrics", "overfitting", "classification"], "xp": 35, "explainer": "Accuracy alone can hide important failures, especially with imbalanced classes. The confusion matrix reveals true positives, false positives, true negatives, and false negatives. Precision, recall, F1, ROC, and AUC answer different questions. Overfitting memorizes noise; underfitting misses real structure. Model evaluation is about matching metrics to decisions.", "visual": {"type": "confusion", "title": "Confusion matrix", "cells": [["TP", "FP"], ["FN", "TN"]]}, "code": "tp, fp, fn = 8, 2, 4\nprecision = tp/(tp+fp)\nrecall = tp/(tp+fn)\nprint(precision, recall)", "exercise": {"prompt": "If tp = 6 and fp = 2, compute precision and print it.", "starter": "tp = 6\nfp = 2\n", "tests": [{"type": "contains", "value": "precision"}, {"type": "contains", "value": "print"}], "solution": "tp = 6\nfp = 2\nprecision = tp / (tp + fp)\nprint(precision)", "hints": ["Precision is TP divided by predicted positives.", "Predicted positives are tp + fp.", "Store it in precision.", "Print the result.", "tp = 6\nfp = 2\nprecision = tp / (tp + fp)\nprint(precision)"], "feedback": "Metrics are decision lenses. Use the one that matches the cost of mistakes."}, "reflection": "Which is worse in your application: false positives or false negatives?", "mistake": "Picking the metric after seeing which one makes your model look best.", "projectNote": "Evaluation is where technical work reconnects to business or social consequences.", "dikw": "A metric is part of wisdom because it encodes what mistakes matter."}, {"id": "p9-l3", "phase": "Phase 9 — Machine Learning Foundations", "title": "Core Models: Linear, Logistic, Trees, KNN, Regularization, PCA, Clustering", "tags": ["models", "PCA", "clustering"], "xp": 40, "explainer": "Linear regression predicts continuous outcomes. Logistic regression estimates class probabilities. KNN predicts from nearby examples. Trees split on features to create decision rules; ensembles such as random forests stabilize them. Regularization fights overfitting by discouraging unnecessary complexity. PCA compresses dimensions. Clustering groups similar observations when labels are absent.", "visual": {"type": "model-grid", "title": "Model families", "items": [["linear", "simple continuous target"], ["logistic", "classification probability"], ["tree", "rule-based splits"], ["KNN", "neighbor similarity"], ["PCA", "compression"], ["clustering", "group discovery"]]}, "code": "from sklearn.cluster import KMeans\nX = [[1,1],[1,2],[8,8],[9,8]]\nmodel = KMeans(n_clusters=2, n_init=10, random_state=0)\nlabels = model.fit_predict(X)\nprint(labels)", "exercise": {"prompt": "Write a Python comment naming one reason to use PCA.", "starter": "# answer here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# PCA can reduce many correlated features into a smaller set of components.", "hints": ["Think dimension reduction.", "It can simplify or compress features.", "Use a single comment line.", "Mention correlation or fewer dimensions.", "# PCA can reduce many correlated features into a smaller set of components."], "feedback": "Different models embody different assumptions. Choosing well means matching model shape to problem shape."}, "reflection": "Do you prefer interpretable models first, or stronger black-box models first?", "mistake": "Using a complex model before establishing a simple baseline.", "projectNote": "Baselines are part of professional discipline, not a beginner crutch.", "dikw": "Reusable modeling patterns are knowledge; knowing when not to use them is wisdom."}, {"id": "p10-l1", "phase": "Phase 10 — Time Series and Forecasting", "title": "Trend, Seasonality, Moving Averages, Forecast Error", "tags": ["time series", "forecasting"], "xp": 35, "explainer": "Time series data has order. Trend captures longer-run direction. Seasonality captures repeating cycles. Moving averages smooth short-term noise. Forecasting tries to estimate future values, but useful forecasting is not just about low error; it is about useful timing, honest uncertainty, and practical action.", "visual": {"type": "timeseries", "title": "Time series anatomy", "components": ["trend", "seasonality", "noise"]}, "code": "sales = [10, 12, 11, 13, 15]\nma3 = []\nfor i in range(2, len(sales)):\n    ma3.append(sum(sales[i-2:i+1])/3)\nprint(ma3)", "exercise": {"prompt": "Given values = [3, 6, 9], compute and print their mean as a tiny moving average example.", "starter": "values = [3, 6, 9]\n", "tests": [{"type": "contains", "value": "sum("}, {"type": "contains", "value": "len("}, {"type": "contains", "value": "print"}], "solution": "values = [3, 6, 9]\nprint(sum(values)/len(values))", "hints": ["Average means total divided by count.", "Use sum(values).", "Use len(values).", "Print the division result.", "values = [3, 6, 9]\nprint(sum(values)/len(values))"], "feedback": "Smoothing helps reveal structure, but it can also hide abrupt changes that matter."}, "reflection": "Would you rather have a slightly more accurate forecast or a more interpretable one?", "mistake": "Evaluating forecasts without respecting time order.", "projectNote": "Forecasts are often used for staffing, inventory, and planning, so timing errors matter.", "dikw": "Forecasting turns historical information into tentative future knowledge."}, {"id": "p11-l1", "phase": "Phase 11 — Deep Learning and Neural Networks", "title": "Perceptrons, Layers, Activations, Forward Pass, Loss, Backprop Intuition", "tags": ["deep learning", "neural networks"], "xp": 40, "explainer": "A neural network is a stack of learned transformations. A perceptron combines inputs with weights and passes the result through an activation. The forward pass computes predictions. The loss measures error. Backpropagation distributes responsibility for that error backward so weights can be updated. You do not need advanced math first; you need the picture of repeated differentiable transformation and improvement.", "visual": {"type": "neural", "title": "Tiny neural net", "layers": [["x1", "x2"], ["h1", "h2"], ["y"]]}, "code": "weights = [0.5, -0.2]\ninputs = [2.0, 1.0]\nz = weights[0]*inputs[0] + weights[1]*inputs[1]\ny = max(0, z)  # ReLU\nprint(y)", "exercise": {"prompt": "Compute z = 0.5*4 + (-1)*1 and print z.", "starter": "# compute z here\n", "tests": [{"type": "contains", "value": "print"}], "solution": "z = 0.5*4 + (-1)*1\nprint(z)", "hints": ["Multiply and add the two terms.", "Store the result in z.", "Then print z.", "This is a tiny weighted sum.", "z = 0.5*4 + (-1)*1\nprint(z)"], "feedback": "Neural networks are built from many simple weighted-sum transformations."}, "reflection": "What part of neural networks feels most mysterious: representation, training, or deciding when to use them?", "mistake": "Thinking deep learning is always the next step after any dataset.", "projectNote": "Deep learning is powerful when you have enough data, compute, and a task that benefits from representation learning.", "dikw": "Deep models can learn useful knowledge patterns, but wisdom includes knowing their limits and costs."}, {"id": "p11-l2", "phase": "Phase 11 — Deep Learning and Neural Networks", "title": "Regularization, Dropout, CNNs, RNNs, and LLM Context", "tags": ["deep learning", "CNN", "RNN", "LLM"], "xp": 40, "explainer": "Regularization discourages brittle memorization. Dropout randomly removes units during training to encourage robustness. CNNs are strong for spatial patterns such as images. RNNs were designed for sequences, though transformers now dominate many sequence tasks. Large language models are sequence models trained on huge corpora; they are powerful pattern engines, not automatic truth engines.", "visual": {"type": "table", "title": "Deep learning map", "headers": ["Model", "Best at"], "rows": [["CNN", "spatial structure"], ["RNN", "sequence memory"], ["Transformer/LLM", "long-range sequence patterns"]]}, "code": "tokens = ['data', 'to', 'wisdom']\nfor t in tokens:\n    print(t.upper())", "exercise": {"prompt": "Write a Python comment naming one case where deep learning may be a poor choice.", "starter": "# answer here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Deep learning may be a poor choice when data is small and interpretability is critical.", "hints": ["Think about small data, compute cost, or interpretability.", "Use one clear sentence.", "Make it specific.", "Use a comment line.", "# Deep learning may be a poor choice when data is small and interpretability is critical."], "feedback": "The smartest model is not always the most appropriate model."}, "reflection": "What tradeoff matters more to you in a model: performance, speed, cost, or interpretability?", "mistake": "Using deep learning to impress rather than to solve the actual problem well.", "projectNote": "Model choice is a design decision under constraints, not a race to sophistication.", "dikw": "Wisdom means matching technique to context, not chasing complexity."}, {"id": "p12-l1", "phase": "Phase 12 — Ethics, Bias, and Wisdom", "title": "Bias, Fairness, Privacy, Limits, and When Not to Automate", "tags": ["ethics", "bias", "privacy"], "xp": 35, "explainer": "Bias can enter through sampling, labeling, feature design, objectives, deployment conditions, and interpretation. Fairness is not one metric but a family of tradeoffs. Privacy and consent matter throughout the data lifecycle. Some decisions should not be automated at all, or should require human review. Wisdom in data science includes restraint.", "visual": {"type": "ethics", "title": "Ethics checkpoints", "items": ["consent", "quality", "fairness", "privacy", "human oversight", "uncertainty"]}, "code": "decision = {\n    'automate': False,\n    'reason': 'high-stakes decision with incomplete and biased data'\n}\nprint(decision)", "exercise": {"prompt": "Write a Python comment naming one reason not to automate a high-stakes decision.", "starter": "# reason here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Do not automate when errors could seriously harm people and the model is not well understood.", "hints": ["Think harm, accountability, fairness, or uncertainty.", "Use one sentence.", "A comment is enough.", "Be concrete about risk.", "# Do not automate when errors could seriously harm people and the model is not well understood."], "feedback": "Responsible data work includes the ability to say no to automation."}, "reflection": "What kinds of decisions should always include human judgment?", "mistake": "Treating fairness as a final metric check instead of a design concern from the start.", "projectNote": "Ethical constraints are part of the problem definition, not external decoration.", "dikw": "Wisdom is the stage where capability meets judgment."}, {"id": "p13-l1", "phase": "Phase 13 — Project Execution", "title": "Micro Tasks and Guided Mini Projects", "tags": ["projects", "execution"], "xp": 30, "explainer": "Execution skill grows through layers. Micro tasks build confidence on one move at a time. Guided mini projects let you practice with scaffolding. The goal is not to stay guided forever; the goal is to internalize a pattern you can later execute independently.", "visual": {"type": "ladder", "title": "Project progression", "items": ["micro task", "guided mini project", "real-world mini project", "independent build"]}, "code": "project_steps = ['question', 'data', 'clean', 'analyze', 'visualize', 'communicate']\nprint(' -> '.join(project_steps))", "exercise": {"prompt": "Create a list steps with at least four project steps and print the last step.", "starter": "# your steps list here\n", "tests": [{"type": "contains", "value": "steps"}, {"type": "contains", "value": "print"}], "solution": "steps = ['question', 'data', 'clean', 'communicate']\nprint(steps[-1])", "hints": ["Use a list named steps.", "Include at least four strings.", "Use negative index -1 for the last item.", "Print that item.", "steps = ['question', 'data', 'clean', 'communicate']\nprint(steps[-1])"], "feedback": "Project structure is part of execution fluency. You should eventually be able to recall these steps without prompting."}, "reflection": "Which project step do you avoid most often because it feels messy or uncertain?", "mistake": "Calling a notebook a project before it has a question, metric, and recommendation.", "projectNote": "Small repeated builds create more capability than one giant heroic project.", "dikw": "Projects are where the full DIKW chain becomes real."}, {"id": "p13-l2", "phase": "Phase 13 — Project Execution", "title": "Independent Builder Framework", "tags": ["projects", "independence", "communication"], "xp": 40, "explainer": "An independent builder can define the problem, define success, identify data needs, collect or simulate data, clean and structure it, analyze and model it, visualize findings, interpret responsibly, communicate recommendations, and reflect on limitations and ethics. Independence is not doing everything alone; it is being able to move the project forward deliberately.", "visual": {"type": "pipeline", "title": "Independent build loop", "steps": ["problem", "metric", "data", "clean", "analyze", "model", "visualize", "recommend", "reflect"]}, "code": "builder_checklist = {\n    'problem': True,\n    'metric': True,\n    'data': True,\n    'ethics': True\n}\nprint(all(builder_checklist.values()))", "exercise": {"prompt": "Write a Python comment listing two things every project report should include.", "starter": "# answer here\n", "tests": [{"type": "contains", "value": "#"}], "solution": "# Every project report should include the main finding and an honest limitation.", "hints": ["Think findings, method, metric, limitation, recommendation.", "Use one sentence.", "A comment is enough.", "Include at least two items.", "# Every project report should include the main finding and an honest limitation."], "feedback": "A mature project ends with clear communication and bounded claims."}, "reflection": "What would make you trust yourself more as an independent builder?", "mistake": "Thinking independence means skipping planning, testing, or peer review.", "projectNote": "The final skill is responsible judgment under uncertainty.", "dikw": "Independent project work is DIKW in action from start to finish."}], "flashcards": [{"front": "From Concept Consumer to Project Builder", "back": "This system is built to close the gap between understanding ideas and executing real work. Data science is not one skill; it is a chain of thinking moves: frame a problem, gather data, transform it, reason statistically,...", "tags": ["orientation", "execution", "DIKW", "Phase 0"], "ease": 2.5, "interval": 0, "due": 0, "history": []}, {"front": "Data, Information, Knowledge, Wisdom", "back": "Data are raw observations: numbers, labels, timestamps, text, images. Information is organized data with context: averages, groups, cleaned tables, trends. Knowledge is a reusable pattern: demand rises on weekends, missi...", "tags": ["DIKW", "thinking", "Phase 1"], "ease": 2.5, "interval": 0, "due": 0, "history": []}, {"front": "Computational Thinking: Decomposition, Abstraction, Modeling", "back": "Computational thinking means structuring problems so a computer and a human can work on them together. Decomposition breaks a big task into smaller parts. Abstraction keeps only the details that matter. Modeling creates ...", "tags": ["computational thinking", "abstraction", "Phase 1"], "ease": 2.5, "interval": 0, "due": 0, "history": []}, {"front": "Variables, Expressions, and Conditionals", "back": "Variables name values so you can reason with them. Expressions compute new values. Conditionals let a program branch based on evidence. In data work, conditionals power filtering, rule-based cleaning, and decision logic.", "tags": ["python", "basics", "Phase 2"], "ease": 2.5, "interval": 0, "due": 0, "history": []}, {"front": "Loops, Strings, Lists, and Dictionaries", "back": "Lists store ordered collections. Dictionaries map keys to values. Strings represent text. Loops let you repeat work across many items. These are the workhorses of beginner data projects because real data almost always ar...", "tags": ["python", "data structures", "Phase 2"], "ease": 2.5, "interval": 0, "due": 0, "history": []}, {"front": "Files, Module
